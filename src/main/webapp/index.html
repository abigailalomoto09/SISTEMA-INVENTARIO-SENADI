<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario | Acceso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body data-page="login">
    <main class="login-page">
        <section class="login-hero">
            <div class="login-copy">
                <span class="eyebrow">SENADI</span>
                <h1>SISTEMA DE INVENTARIO DE LOS EQUIPOS TECNOLOGICOS</h1>
                <p>Ingrese sus credenciales institucionales para acceder al sistema</p>
                <div class="hero-pill-row">
                    <span class="hero-pill">Inventario</span>
                    <span class="hero-pill">Busqueda avanzada</span>
                    <span class="hero-pill">Historial</span>
                </div>
            </div>
        </section>

        <section class="login-panel">
            <div class="login-card">
                <div class="login-card__header">
                    <div>
                        <p class="login-kicker">Acceso al sistema</p>
                        <h2>Iniciar sesion</h2>
                    </div>
                    <div class="live-clock">
                        <span id="liveDate">--</span>
                        <strong id="liveClock">--:--:--</strong>
                    </div>
                </div>

                <form id="loginForm" class="login-form">
                    <label class="field">
                        <span>Usuario</span>
                        <input type="text" id="username" name="username" placeholder="Ingrese su usuario" required>
                    </label>
                    <label class="field">
                        <span>Contrasena</span>
                        <input type="password" id="password" name="password" placeholder="Ingrese su contrasena" required>
                    </label>
                    <label class="field">
                        <span>Rol</span>
                        <select id="roleSelect" name="rol" required>
                            <option value="">Seleccione rol...</option>
                            <option value="ADMINISTRADOR">Administrador</option>
                            <option value="TECNICO">Técnico</option>
                            <option value="CUSTODIO">Custodio</option>
                        </select>
                    </label>
                    <button type="submit" id="loginSubmit" class="btn-login">Entrar</button>
                    <div id="loginError" class="login-alert is-hidden"></div>
                </form>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
